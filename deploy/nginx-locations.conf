# istanbul-vitamin — Nginx location snippets
# Paste these INSIDE the `server {}` block of the CloudPanel-managed vhost for
# istanbulvitamin.com (edit via CloudPanel → Site → Vhost). The site itself is
# a Reverse Proxy to 127.0.0.1:3002 — the extra locations below override that
# for API/uploads/webhook.

# Go API
location /api/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;
}

# Backend-served uploaded images
location /uploads/ {
    proxy_pass http://127.0.0.1:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_cache_valid 200 7d;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
}

# GitHub webhook — path is intentionally non-obvious.
# Change WEBHOOK_SECRET + this path if it ever leaks.
location /deploy/webhook {
    proxy_pass http://127.0.0.1:9001/webhook;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # GitHub payloads can exceed default 1m
    client_max_body_size 5m;
}

# Larger multipart uploads for the admin image uploader
client_max_body_size 20m;
